name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Caffeinate ${{ github.ref_name }}
          files: bin/Release/net9.0-windows/win-x64/publish/Caffeinate.exe
          generate_release_notes: true
